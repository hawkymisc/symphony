name: Rust

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (${{ matrix.features }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    strategy:
      matrix:
        include:
          - features: default
            cargo_args: ""
          - features: http-server
            cargo_args: "--features http-server"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ matrix.features }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.features }}-
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build ${{ matrix.cargo_args }}

      - name: Run tests
        run: cargo test ${{ matrix.cargo_args }}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Clippy (http-server feature)
        run: cargo clippy --features http-server -- -D warnings
